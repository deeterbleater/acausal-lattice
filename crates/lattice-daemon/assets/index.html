<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acausal Lattice Sandbox</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #0b0e14;
            color: #d1d5db;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            padding: 1rem;
            background-color: #1a1f29;
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        #lattice-graph {
            flex: 2;
            border-right: 1px solid #2d3748;
            position: relative;
        }
        #sidebar {
            flex: 1;
            padding: 1rem;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }
        .vector-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .vector-cell {
            aspect-ratio: 1;
            background-color: #1e293b;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        .event-log {
            background-color: #1a1f29;
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .status-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            background-color: #2d3748;
        }
        .status-active {
            background-color: #059669;
            color: white;
        }
        .panel {
            background-color: #1a1f29;
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid #2d3748;
        }
        .panel h3 { margin-top: 0; margin-bottom: 0.5rem; font-size: 0.9rem; color: #94a3b8; }
        
        /* Form Styles */
        input[type="text"], select, textarea {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            width: 100%;
            padding: 0.5rem;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover { background-color: #2563eb; }
        
        /* Node Inspector */
        #inspector-content { font-size: 0.85rem; }
        .inspector-row { margin-bottom: 0.25rem; }
        .inspector-label { color: #64748b; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div>Acausal Lattice Sandbox</div>
        <div id="status" class="status-badge">Disconnected</div>
    </header>
    <main>
        <div id="lattice-graph"></div>
        <div id="sidebar">
            <div class="panel">
                <h3>Latent State Vector</h3>
                <div id="vector-grid" class="vector-grid"></div>
            </div>
            
            <div class="panel" id="inspector-panel">
                <h3>Node Inspector</h3>
                <div id="inspector-content">Select a node in the graph to view details.</div>
            </div>

            <div class="panel">
                <h3>Inject Event (Third Agent)</h3>
                <form id="inject-form">
                    <textarea id="inj-content" rows="3" placeholder="Describe the new potential event..." required></textarea>
                    <input type="text" id="inj-antecedents" placeholder="Dependencies (comma-separated IDs) e.g. 1, 2">
                    <select id="inj-subspace">
                        <option value="">No Subspace Warping (Identity)</option>
                        <option value="0">Warp Subspace 0</option>
                        <option value="1">Warp Subspace 1</option>
                    </select>
                    <button type="submit">Inject into Aion</button>
                </form>
            </div>

            <div class="panel">
                <h3>Telemetry</h3>
                <div id="event-log" class="event-log"></div>
            </div>
        </div>
    </main>

    <script>
        // Data Stores
        const achrononStore = new Map(); // id -> full Achronon object
        const nodes = new vis.DataSet();
        const edges = new vis.DataSet();
        
        // Network Initialization
        const container = document.getElementById('lattice-graph');
        const data = { nodes, edges };
        const options = {
            nodes: {
                shape: 'dot',
                size: 20,
                font: { color: '#ffffff', size: 12 },
                borderWidth: 2,
                color: {
                    background: '#1e293b',
                    border: '#334155',
                    highlight: { background: '#3b82f6', border: '#60a5fa' }
                }
            },
            edges: {
                arrows: { to: { enabled: true, scaleFactor: 0.5 } },
                color: '#475569'
            },
            physics: {
                enabled: true,
                solver: 'forceAtlas2Based',
                forceAtlas2Based: { gravitationalConstant: -50, centralGravity: 0.01, springLength: 100 }
            }
        };
        const network = new vis.Network(container, data, options);

        // UI Elements
        const statusBadge = document.getElementById('status');
        const vectorGrid = document.getElementById('vector-grid');
        const eventLog = document.getElementById('event-log');
        const inspectorContent = document.getElementById('inspector-content');

        // SSE Setup
        const eventSource = new EventSource('/stream');
        eventSource.onopen = () => {
            statusBadge.innerText = 'Connected';
            statusBadge.classList.add('status-active');
        };
        eventSource.onerror = () => {
            statusBadge.innerText = 'Error';
            statusBadge.classList.remove('status-active');
        };
        eventSource.onmessage = (e) => {
            const event = JSON.parse(e.data);
            handleEvent(event);
        };

        // Graph Interaction
        network.on("click", function (params) {
            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                const achronon = achrononStore.get(nodeId);
                if (achronon) {
                    inspectorContent.innerHTML = `
                        <div class="inspector-row"><span class="inspector-label">ID:</span> ${achronon.id}</div>
                        <div class="inspector-row"><span class="inspector-label">Content:</span> ${achronon.content}</div>
                        <div class="inspector-row"><span class="inspector-label">Operator:</span> ${achronon.transformation_id}</div>
                        <div class="inspector-row"><span class="inspector-label">Subspace:</span> ${achronon.affected_subspace !== null ? achronon.affected_subspace : 'None'}</div>
                        <div class="inspector-row"><span class="inspector-label">Antecedents:</span> [${achronon.antecedents.join(', ')}]</div>
                    `;
                    
                    // Auto-fill antecedents if form is empty
                    const antInput = document.getElementById('inj-antecedents');
                    if(antInput.value === "") {
                        antInput.value = nodeId;
                    } else if (!antInput.value.includes(nodeId)) {
                        antInput.value += `, ${nodeId}`;
                    }
                }
            } else {
                inspectorContent.innerHTML = "Select a node in the graph to view details.";
            }
        });

        // Form Handling
        document.getElementById('inject-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = document.getElementById('inj-content').value;
            const antStr = document.getElementById('inj-antecedents').value;
            const subStr = document.getElementById('inj-subspace').value;
            
            const antecedents = antStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            const affected_subspace = subStr === "" ? null : parseInt(subStr);

            const payload = { content, antecedents, affected_subspace };

            try {
                const res = await fetch('/inject', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    document.getElementById('inj-content').value = ""; // clear content on success
                } else {
                    console.error("Injection failed");
                }
            } catch(err) {
                console.error(err);
            }
        });

        function handleEvent(event) {
            const logItem = document.createElement('div');
            logItem.style.marginBottom = '0.25rem';
            logItem.innerText = `[${new Date().toLocaleTimeString()}] ${event.type}`;
            eventLog.prepend(logItem);

            switch(event.type) {
                case 'AionExpanded':
                    event.data.forEach(a => {
                        achrononStore.set(a.id, a);
                        if (!nodes.get(a.id)) {
                            nodes.add({ id: a.id, label: `[${a.id}]`, title: a.content });
                            a.antecedents.forEach(ant => {
                                edges.add({ from: ant, to: a.id });
                            });
                        }
                    });
                    break;
                case 'AchrononPrecipitated':
                    nodes.update({ id: event.data, color: { background: '#059669', border: '#10b981' } });
                    break;
                case 'StateUpdated':
                    updateVectorGrid(event.data);
                    break;
                case 'Message':
                    logItem.innerText += `: ${event.data}`;
                    break;
            }
        }

        function updateVectorGrid(vector) {
            vectorGrid.innerHTML = '';
            vector.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'vector-cell';
                cell.innerText = val.toFixed(2);
                
                // Color mapping: positive = green, negative = red
                const intensity = Math.min(Math.abs(val) * 255, 255);
                if (val > 0.01) cell.style.backgroundColor = `rgba(16, 185, 129, ${Math.min(Math.abs(val), 1)})`;
                if (val < -0.01) cell.style.backgroundColor = `rgba(239, 68, 68, ${Math.min(Math.abs(val), 1)})`;
                
                vectorGrid.appendChild(cell);
            });
        }
    </script>
</body>
</html>
